# version: '3.8'

services:
  # 🧠 Pipeline MediCore (dbt + Python)
  medicore-elt-batch:
    build: .
    container_name: medicore_elt_batch
    env_file:
      - .env
    environment:
      - ENV=dev
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092  # listener INTERNAL (pas EXTERNAL/localhost)
      - SNOWFLAKE_ACCOUNT=${SNOWFLAKE_ACCOUNT}
      - SNOWFLAKE_USER=${SNOWFLAKE_USER}
      - SNOWFLAKE_PASSWORD=${SNOWFLAKE_PASSWORD}
      - SNOWFLAKE_WAREHOUSE_NAME=${SNOWFLAKE_WAREHOUSE_NAME}
      - SNOWFLAKE_DATABASE=${SNOWFLAKE_DATABASE}
      - SNOWFLAKE_SCHEMA_NAME=${SNOWFLAKE_SCHEMA_NAME}
      - SNOWFLAKE_ROLE_NAME=${SNOWFLAKE_ROLE_NAME}
      - SNOWFLAKE_DBT_ROLE_NAME=${SNOWFLAKE_DBT_ROLE_NAME}
    volumes:
      - ./dbt:/app/dbt
      - ./pipelines:/app/pipelines
      - ./logs:/app/logs
      - ./tests:/app/tests
      - ./backups:/app/backups
      - dbt_cache:/home/appuser/.dbt
    depends_on:
      # healthcheck Docker
      kafka:
        condition: service_healthy
      connect:
        condition: service_healthy
      mysql_cdc:
        condition: service_healthy
    networks:
      - medicore_net
    restart: unless-stopped
    mem_limit: 8g
    cpus: 2
    command: ./scripts/batch_loop.sh ${ENV:-dev}

  # 🐘 MySQL de demo pour CDC (equivalent Winstat local)
  mysql_cdc:
    image: debezium/example-mysql:2.7.3.Final
    container_name: mysql_cdc
    environment:
      - MYSQL_ROOT_PASSWORD=debezium
      - MYSQL_USER=cdc_user
      - MYSQL_PASSWORD=cdc_password
      - MYSQL_DATABASE=winstat
    ports:
      - "127.0.0.1:3307:3306"
    networks:
      - medicore_net
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdebezium"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 🦍 Zookeeper (necessaire pour Kafka classique)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,srvr"
    networks:
      - medicore_net
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # 📬 Kafka broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "127.0.0.1:9092:9092"
    networks:
      - medicore_net
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # Debezium Kafka Connect
  connect:
    image: debezium/connect:2.7.3.Final
    container_name: kafka_connect
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: medicore-connect-configs
      OFFSET_STORAGE_TOPIC: medicore-connect-offsets
      STATUS_STORAGE_TOPIC: medicore-connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      REST_PORT: 8083
      REST_ADVERTISED_HOST_NAME: localhost
    ports:
      - "127.0.0.1:8083:8083"
    volumes:
      - connect_config:/kafka/connect-configs
      - connect_offset:/kafka/connect-offsets
      - connect_status:/kafka/connect-statuses
    networks:
      - medicore_net
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # 🧭 Kafdrop (UI pour voir les topics Kafka)
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
    ports:
      - "127.0.0.1:9000:9000"
    networks:
      - medicore_net
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5

  # 🐘 PostgreSQL (metadata Metabase)
  metabase_db:
    image: postgres:16-alpine
    container_name: metabase_db
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: ${METABASE_DB_PASSWORD:-metabase_dev}
    volumes:
      - metabase_data:/var/lib/postgresql/data
    networks:
      - medicore_net
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 📊 Metabase (BI dashboards sur Snowflake MARTS)
  metabase:
    image: metabase/metabase:v0.58.7
    container_name: metabase
    depends_on:
      metabase_db:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: metabase_db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: metabase
      MB_DB_PASS: ${METABASE_DB_PASSWORD:-metabase_dev}
      MB_JETTY_PORT: 3000
      # SMTP pour emails d'invitation et alertes
      MB_EMAIL_SMTP_HOST: ${MB_EMAIL_SMTP_HOST:-smtp.gmail.com}
      MB_EMAIL_SMTP_PORT: ${MB_EMAIL_SMTP_PORT:-587}
      MB_EMAIL_SMTP_SECURITY: ${MB_EMAIL_SMTP_SECURITY:-tls}
      MB_EMAIL_SMTP_USERNAME: ${MB_EMAIL_SMTP_USERNAME:-}
      MB_EMAIL_SMTP_PASSWORD: ${MB_EMAIL_SMTP_PASSWORD:-}
      MB_EMAIL_FROM_ADDRESS: ${MB_EMAIL_FROM_ADDRESS:-metabase@mediprix.fr}
      MB_EMAIL_FROM_NAME: ${MB_EMAIL_FROM_NAME:-MediCore BI}
      MB_SITE_URL: ${MB_SITE_URL:-http://192.168.0.37:3000}
    ports:
      - "0.0.0.0:3000:3000"
    networks:
      - medicore_net
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1

  # 📚 dbt Docs (Data Catalog sur Snowflake, accessible réseau local)
  dbt_docs:
    image: python:3.11-slim
    container_name: dbt_docs
    volumes:
      - ./dbt/target:/app/target:ro
    ports:
      - "0.0.0.0:8080:8080"
    networks:
      - medicore_net
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    working_dir: /app/target
    command: python -m http.server 8080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  dbt_cache:
  connect_config:
  connect_offset:
  connect_status:
  metabase_data:

networks:
  medicore_net:
    driver: bridge
