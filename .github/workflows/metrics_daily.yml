name: Daily clustering metrics

# Collecte quotidienne des métriques clustering RAW_MEDIPRIX_FACTURES.
# Lance scripts/clustering_metrics_daily.py avec les secrets Snowflake injectés,
# puis commite le CSV mis à jour.
#
# Schedule : 07h15 UTC = 09h15 CEST (été) / 08h15 CET (hiver).
# Latence ACCOUNT_USAGE Snowflake (45 min - 3 h) absorbée puisque la nuit
# finit ~02h UTC (04h FR).
#
# ATTENTION : le couloir 7h-9h UTC est une zone de pic de charge GitHub Actions
# free tier (rush matinal Europe + bascule jobs US/Asie). Les schedules dans
# cette plage subissent des retards de 1-2h voire des skips silencieux.
# Si retards/skips répétés, decaler le cron hors de cette plage (ex: 13h-15h UTC).
# Fallback en cas de skip : `gh workflow run metrics_daily.yml --ref main`.
#
# IMPORTANT : le cron GitHub Actions utilise la branche par défaut (`main`).
# Tant que ce workflow n'est pas mergé dans main, seul `workflow_dispatch`
# (lancement manuel) fonctionnera.

on:
  schedule:
    - cron: '15 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    name: Collect clustering metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install snowflake-connector-python python-dotenv

      - name: Run clustering metrics collection
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE_NAME: ${{ secrets.SNOWFLAKE_WAREHOUSE_NAME }}
          SNOWFLAKE_DATABASE: MEDICORE_PROD
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python scripts/clustering_metrics_daily.py

      - name: Show last lines for visibility
        run: |
          echo "=== Dernières lignes du CSV ==="
          tail -n 8 reports/clustering_metrics.csv

      - name: Commit if CSV changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet reports/clustering_metrics.csv; then
            echo "No changes to commit (CSV unchanged)"
          else
            git add reports/clustering_metrics.csv
            git commit -m "chore: collecte quotidienne métriques clustering [skip ci]"
            git push
          fi
