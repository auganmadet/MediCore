name: CI/CD Pipeline

on:
  push:
    branches: [main, 'feature/*', 'fix/*']
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Installer les dependances
        run: pip install -r requirements.txt flake8

      - name: Flake8 lint
        run: flake8 pipelines/ --max-line-length=120 --ignore=E501,W503,E241

  test-python:
    name: Tests Python (audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Installer les dependances
        run: pip install -r requirements.txt pytest

      - name: Tests audit
        run: pytest tests/test_audit.py -v

  validate-dbt:
    name: Valider syntaxe dbt
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: dbt
      SNOWFLAKE_ACCOUNT: ci_dummy
      SNOWFLAKE_USER: ci_dummy
      SNOWFLAKE_PASSWORD: ci_dummy
      SNOWFLAKE_DATABASE: ci_dummy
      SNOWFLAKE_WAREHOUSE_NAME: ci_dummy
      SNOWFLAKE_DBT_ROLE_NAME: ci_dummy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Installer dbt
        run: pip install dbt-core==1.8.0 dbt-snowflake==1.8.0

      - name: dbt deps
        run: dbt deps --project-dir dbt

      - name: dbt parse (validation syntaxe)
        run: dbt parse --project-dir dbt

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t medicore-elt:ci .

  shellcheck:
    name: Lint Bash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: shellcheck scripts/*.sh --severity=warning || true

  push-image:
    name: Push Docker image (GHCR)
    runs-on: ubuntu-latest
    needs: [lint-python, test-python, validate-dbt, build-docker, shellcheck]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
      contents: read
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Se connecter a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata Docker (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build et push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
