name: 'medicore'
version: '1.0.0's
config-version: 2

profile: 'medicore'

model-paths: ["models"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  raw:
    +materialized: incremental
    +schema: RAW
    +tags: ['raw', 'cdc']
  staging:
    +materialized: table
    +schema: STAGING
  marts:
    +materialized: table
    +schema: MARTS
