[pytest]
# Configuration pytest pour le projet MediCore

# Répertoire des tests
testpaths = tests

# Options par défaut
addopts = -v --tb=short

# Patterns des fichiers de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marqueurs personnalisés
markers =
    slow: Tests lents (nécessitent connexion réelle)
    integration: Tests d'intégration
    unit: Tests unitaires

# Filtrer les warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout par défaut (secondes)
timeout = 60
