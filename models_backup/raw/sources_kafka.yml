version: 2

sources:
  - name: kafka_cdc
    description: "Debezium CDC - winstat_rds.winstat.* topics"
    database: MEDICORE
    schema: RAW
    tables:
      # COMMANDES (PK: PHA_ID, COM_GROI, PRD_ID)
      - name: winstat_commandes
        description: "CDC winstat_rds.winstat.COMMANDES"
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: _cdc_ts_ms
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: COM_GROI
            description: "Gros commande"
            tests: [not_null]
          - name: PRD_ID
            description: "ID produit"
            tests: [not_null]

      # FACTURES (PK: PHA_ID, FAC_ID, FAC_TI)
      - name: winstat_factures
        description: "CDC winstat_rds.winstat.FACTURES"
        freshness:
          warn_after: {count: 6, period: hour}
        loaded_at_field: _cdc_ts_ms
        columns:
          - name: PHA_ID
            tests: [not_null]
          - name: FAC_ID
            tests: [not_null]
          - name: FAC_TI
            tests: [not_null]

      # ORDERS (PK: PHA_ID, FAC_ID)
      - name: winstat_orders
        description: "CDC winstat_rds.winstat.ORDERS"
        freshness:
          warn_after: {count: 6, period: hour}
        loaded_at_field: _cdc_ts_ms

      # PHARMACIE (PK: PHA_ID)
      - name: winstat_pharmacie
        description: "CDC winstat_rds.winstat.PHARMACIE"
        loaded_at_field: _cdc_ts_ms
        columns:
          - name: PHA_ID
            tests: [not_null, unique]

      # MODSTOCK (PK: PHA_ID, MOD_DATE, PRD_ID)
      - name: winstat_modstock
        description: "CDC winstat_rds.winstat.MODSTOCK"
        freshness:
          warn_after: {count: 12, period: hour}
        loaded_at_field: _cdc_ts_ms
        columns:
          - name: PHA_ID
            tests: [not_null]
          - name: PRD_ID
            tests: [not_null]

      # DAYBYDAY (PK: PHA_ID, DBD_DATE, PRD_ID)
      - name: winstat_daybyday
        description: "CDC winstat_rds.winstat.DAYBYDAY"
        freshness:
          warn_after: {count: 12, period: hour}
        loaded_at_field: _cdc_ts_ms
        columns:
          - name: PHA_ID
            tests: [not_null]
          - name: DBD_DATE
            tests: [not_null]
          - name: PRD_ID
            tests: [not_null]
