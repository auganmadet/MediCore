name: 'medicore'
version: '1.0.0'
config-version: 2

profile: 'medicore'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: 
  - "target"
  - "dbt_packages"

models:
  raw:
    +materialized: incremental
    +schema: RAW
    +tags: ['raw', 'cdc']
  staging:
    +materialized: table
    +schema: STAGING
  marts:
    +materialized: table
    +schema: MARTS
    +cluster_by: ['pharmacie_sk', 'date_vente']
