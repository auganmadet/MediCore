name: 'medicore'
version: '1.0.0'
config-version: 2

profile: 'medicore'

model-paths: ["models"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

on-run-start: "{{ guard_seed_prod() }}"

# NOTE: log_run_summary désactivé car table AUDIT.DBT_MODEL_RUNS n'existe pas encore
# Réactiver après création des tables audit: "{{ log_run_summary(results) }}"
# NOTE: reapply_rls_policies désactivé — Alternative A (1 connexion, pas de Row Access Policy)
# Réactiver si migration vers Metabase Pro (multi-connexion + sandboxing)

vars:
  run_id: 'manual'

models:
  medicore:
    staging:
      +materialized: view
      +schema: STAGING
    marts:
      +materialized: table
      +schema: MARTS
    audit:
      +materialized: view
      +schema: AUDIT

seeds:
  medicore:
    +schema: RAW
    raw_history:
      +post-hook:
        - "ALTER TABLE {{ this }} RENAME COLUMN DATE TO \"Date\""
