medicore:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: MEDIcore_DBT_EXECUTOR
      database: MEDIcore
      warehouse: MEDIcore_WH
      schema: STAGING
      threads: 4
      
    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: MEDIcore_DBT_EXECUTOR
      database: MEDIcore
      warehouse: MEDIcore_WH_XL
      schema: MARTS
      threads: 8
