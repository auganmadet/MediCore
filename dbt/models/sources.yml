version: 2

sources:
  - name: mysql_raw
    schema: RAW
    database: MEDICORE
    tables:
      - name: RAW_COMMANDES
        description: "Commandes CDC (alimenté par Kafka → daily_cdc_batch.py)"
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: cdc_operation
            description: "Opération CDC Debezium (C=create, U=update, D=delete, R=read/snapshot, S=snapshot)"
            tests:
              - accepted_values:
                  values: ['C', 'U', 'D', 'R', 'S']
                  config:
                    severity: warn
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: COM_GROI
            description: "Numéro de commande"
            tests: [not_null]
          - name: PRD_ID
            description: "ID produit"
            tests: [not_null]
            
      # EAN13 (3 colonnes)
      - name: RAW_EAN13
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: EAN_13
            tests: [not_null]
          - name: PRD_ID
            description: "ID produit"
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
                  config:
                    severity: warn

      # FOURNISSEURS (12 colonnes)
      - name: RAW_FOURNISSEURS
        description: "Répertoire fournisseurs (PK: PHA_ID, FOU_ID)"
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: FOU_ID
            description: "ID fournisseur"
            tests: [not_null]
          - name: FOU_NOM
            description: "Nom fournisseur"
          - name: FOU_ADRESSE
            description: "Adresse fournisseur"
          - name: FOU_CP
            description: "Code postal fournisseur"
          - name: FOU_VILLE
            description: "Ville fournisseur"
          - name: FOU_TYPE
            description: "Type fournisseur"
          - name: FOU_REPARTITEUR
            description: "Répartiteur fournisseur"
          - name: FOU_ETABLISSEMENT
            description: "Etablissement fournisseur"
          - name: FOU_IDCLIENT
            description: "ID client fournisseur"
          - name: FOU_URL1
            description: "URL1 fournisseur"
          - name: FOU_URL2
            description: "URL2 fournisseur"

      # HISTORY (40 colonnes)
      - name: RAW_HISTORY
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: Date
            description: "Date de l'historique (peut être NULL pour anciens enregistrements)"
          - name: EspeceFRF
            tests: [not_null]
          - name: ChequeFRF
            tests: [not_null]
          - name: CB
            tests: [not_null]
          - name: Centre
            tests: [not_null]
          - name: Differe_Positif
            tests: [not_null]
          - name: nb_De_Factures
            tests: [not_null]
          - name: nb_De_Subro
            tests: [not_null]
          - name: TVA_1
            tests: [not_null]
          - name: TVA_2
            tests: [not_null]
          - name: TVA_3
            tests: [not_null]
          - name: TVA_4
            tests: [not_null]
          - name: TVA_5
            tests: [not_null]
          - name: Marge_Rembt
            tests: [not_null]
          - name: Marge_NRembt
            tests: [not_null]
          - name: Remise_EnCompte
            tests: [not_null]
          - name: Remise_EnLigne
            tests: [not_null]
          - name: EnCompte_Positif
            tests: [not_null]
          - name: Mutuelle
            tests: [not_null]
          - name: EspeceEUR
            tests: [not_null]
          - name: ChequeEUR
            tests: [not_null]
          - name: Virement
            tests: [not_null]
          - name: SubroPartAssure
            tests: [not_null]
          - name: Controle
            tests: [not_null]
          - name: PointsFidel
            tests: [not_null]
          - name: Particulier
            tests: [not_null]
          - name: EnCompteBL_Positif
            tests: [not_null]
          - name: Differe_Negatif
            tests: [not_null]
          - name: EnCompte_Negatif
            tests: [not_null]
          - name: EnCompteBL_Negatif
            tests: [not_null]
          - name: CA_Retro_1
            tests: [not_null]
          - name: CA_Retro_2
            tests: [not_null]
          - name: CA_Retro_3
            tests: [not_null]
          - name: CA_Retro_4
            tests: [not_null]
          - name: CA_Retro_5
            tests: [not_null]
          - name: DMPositif
            tests: [not_null]
          - name: DMNegatif
            tests: [not_null]
          - name: DMRetroPositif
            tests: [not_null]
          - name: DMRetroNegatif
            tests: [not_null]

      # LOG (2 colonnes)
      - name: RAW_LOG
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: PHA_ID
            tests: [not_null, unique]
          - name: DATE_SYNC

      # LPPR (6 colonnes)
      - name: RAW_LPPR
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: PRD_ID
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
                  config:
                    severity: warn
          - name: LPP_INDEX
            tests: [not_null]
          - name: LPP_CODE
            tests: [not_null]
          - name: LPP_QTE
            tests: [not_null]
          - name: LPP_ACTE_NOM
            tests: [not_null]

      # MANQHISTORY (7 colonnes)
      - name: RAW_MANQHISTORY
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: MNQ_DATE
            tests: [not_null]
          - name: PRD_ID
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
                  config:
                    severity: warn
          - name: FAC_ID
            tests: [not_null]
          - name: EN_LIGNES
            tests: [not_null]
          - name: EN_BOITES
            tests: [not_null]
          - name: EN_CLIENTS
            tests: [not_null]

      # MEDIPRIX_FACTURES (18 colonnes)
      - name: RAW_MEDIPRIX_FACTURES
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: id
            tests: [not_null, unique]
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: FAC_ID
            tests: [not_null]
          - name: FAC_TI
            tests: [not_null]
          - name: FAC_DATE
          - name: FAC_HEURE
          - name: FAC_TVA
          - name: FAC_QUANTITE
            description: "Quantité facturée (peut être négative pour les retours)"
          - name: FAC_PAHT
          - name: FAC_PVHT
          - name: FAC_PVTTC
          - name: FAC_PRIXPUBLIC
          - name: FAC_CODEREMBT
          - name: PRD_ID
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
                  config:
                    severity: warn
          - name: PRD_EAN13
          - name: PRD_NOM
          - name: ORD_OPERATEUR
          - name: PHA_NOM
          
      # PRODUITS (23 colonnes)
      - name: RAW_PRODUITS
        description: "Catalogue produits (PK: PHA_ID, PRD_ID)"
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: PRD_ID
            description: "ID produits"
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
                  config:
                    severity: warn
          - name: PRD_EAN13
            description: ""
          - name: PRD_NOM
            description: ""
          - name: PRD_IDMAJPRD
            description: ""
          - name: FOU_ID
            tests:
              - relationships:
                  to: ref('stg_fournisseurs')
                  field: FOU_ID
                  config:
                    severity: warn
          - name: PRD_CODEREMBT
            description: ""
          - name: PRD_CODEACTE
            description: ""
          - name: PRD_FIRSTSTOCK
            description: ""
          - name: PRD_TVA
            description: ""
          - name: PRD_NTVA
            description: ""
          - name: PRD_CREATE
            description: ""
          - name: PRD_STOCK
            description: ""
          - name: PRD_PRIXTARIF
            description: "Prix tarif (peut être 0 ou négatif pour produits spéciaux)"
          - name: PRD_DERN_VENTE
            description: ""
          - name: PRD_DERN_ACHAT
            description: ""
          - name: PRD_FLAG3
            description: ""
          - name: PRD_REFGEN
            description: ""
          - name: PRD_EN_STOCK
            description: ""
          - name: PRD_EN_COMMANDE
            description: ""
          - name: PRD_EN_PROMIS
            description: ""
          - name: PRD_DELETED
            description: ""
          - name: PRD_ONLYPROMIS
            description: ""

      # PRODUITS_NEGATIFS (2 colonnes)
      - name: RAW_PRODUITS_NEGATIFS
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: PRD_ID
            description: "ID du produit"
            tests: [not_null, unique]
          - name: PRD_NOM
            description: "Nom du produit"
          
      # STOCKHISTORY (9 colonnes)
      - name: RAW_STOCKHISTORY
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: PRD_ID
            description: "ID produits"
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
                  config:
                    severity: warn
          - name: STH_DATE
            tests: [not_null]
          - name: STH_STOCKDELTA
            tests: [not_null]
          - name: STH_STOCK
            description: ""
          - name: STH_PRIXTARIF
            description: ""
          - name: STH_PRIXPUBLIC
            description: ""
          - name: STH_PAMP
            description: ""
          - name: STH_PANET
            description: ""

      # pharmacies (8 colonnes)
      - name: RAW_PHARMACIES
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: id
            description: "ID pharmacies"
            tests: [not_null, unique]
          - name: adeli
            description: ""
          - name: name
            description: ""
          - name: phone
            description: ""
          - name: city
            description: ""
          - name: postal_code
            description: ""
          - name: parent_id
            description: ""
          - name: left_groupment
            description: ""
            tests: [not_null]
          
      # pharmacies_erreur (3 colonnes)
      - name: RAW_PHARMACIES_ERREUR
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: id
            description: ""
          - name: code_erreur
            description: ""
          - name: date_erreur
            description: ""

      # FACTURES (batch quotidien, ex-CDC)
      - name: RAW_FACTURES
        description: "Factures CDC (batch quotidien)"
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: cdc_operation
            description: "Opération CDC Debezium (C=create, U=update, D=delete, R=read/snapshot, S=snapshot)"
            tests:
              - accepted_values:
                  values: ['C', 'U', 'D', 'R', 'S']
                  config:
                    severity: warn
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: FAC_ID
            tests: [not_null]
          - name: FAC_TI
            tests: [not_null]
          - name: PRD_ID
            description: "ID produit"
            tests: [not_null]

      # ORDERS (batch quotidien, ex-CDC)
      - name: RAW_ORDERS
        description: "Ordonnances CDC (batch quotidien)"
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: cdc_operation
            description: "Opération CDC Debezium (C=create, U=update, D=delete, R=read/snapshot, S=snapshot)"
            tests:
              - accepted_values:
                  values: ['C', 'U', 'D', 'R', 'S']
                  config:
                    severity: warn
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: FAC_ID
            tests: [not_null]

      # MODSTOCK (batch quotidien, ex-CDC)
      - name: RAW_MODSTOCK
        description: "Mouvements de stock (batch quotidien)"
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: cdc_operation
            description: "Opération CDC Debezium (C=create, U=update, D=delete, R=read/snapshot, S=snapshot)"
            tests:
              - accepted_values:
                  values: ['C', 'U', 'D', 'R', 'S']
                  config:
                    severity: warn
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: PRD_ID
            description: "ID produit"
            tests: [not_null]
          - name: MOD_DATE
            tests: [not_null]

      # PHARMACIE (batch quotidien, ex-CDC)
      - name: RAW_PHARMACIE
        description: "Référentiel pharmacies (batch quotidien)"
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null, unique]
          - name: PHA_NOM
            description: "Nom pharmacie"

      # DAYBYDAY (batch quotidien, ex-CDC)
      - name: RAW_DAYBYDAY
        description: "Ventes journalières par produit (batch quotidien)"
        freshness:
          warn_after: {count: 36, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: CDC_TIMESTAMP
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: DBD_DATE
            tests: [not_null]
          - name: PRD_ID
            description: "ID produit"
            tests: [not_null]
