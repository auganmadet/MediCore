version: 2

sources:
  - name: mysql_raw
    schema: RAW
    database: MEDICORE
    tables:
      - name: RAW_COMMANDES
        description: "Commandes CDC consolidées (alimenté par Kafka → daily_cdc_batch.py)"
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: COM_GROI
            description: "Numéro de commande"
            tests: [not_null]
          - name: PRD_ID
            description: "ID produit"
            tests: [not_null]
            
      # EAN13 (3 colonnes)
      - name: RAW_EAN13
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: EAN_13
            tests: [not_null]
          - name: PRD_ID
            description: "ID produit"
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
            
      # FOURNISSEURS (12 colonnes)
      - name: RAW_FOURNISSEURS
        description: "Répertoire fournisseurs (PK: PHA_ID, FOU_ID)"
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: FOU_ID
            description: "ID fournisseur"
            tests: [not_null]
          - name: FOU_NOM
            description: "Nom fournisseur"
          - name: FOU_ADRESSE
            description: "Adresse fournisseur"
          - name: FOU_CP
            description: "Code postal fournisseur"
          - name: FOU_VILLE
            description: "Ville fournisseur"
          - name: FOU_TYPE
            description: "Type fournisseur"
          - name: FOU_REPARTITEUR
            description: "Répartiteur fournisseur"
          - name: FOU_ETABLISSEMENT
            description: "Etablissement fournisseur"
          - name: FOU_IDCLIENT
            description: "ID client fournisseur"
          - name: FOU_URL1
            description: "URL1 fournisseur"
          - name: FOU_URL2
            description: "URL2 fournisseur"

      # HISTORY (40 colonnes)
      - name: RAW_HISTORY
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: Date
            tests: [not_null]
          - name: EspeceFRF
            tests: [not_null]
          - name: ChequeFRF
            tests: [not_null]
          - name: CB
            tests: [not_null]
          - name: Centre
            tests: [not_null]
          - name: Differe_Positif
            tests: [not_null]
          - name: nb_De_Factures
            tests: [not_null]
          - name: nb_De_Subro
            tests: [not_null]
          - name: TVA_1
            tests: [not_null]
          - name: TVA_2
            tests: [not_null]
          - name: TVA_3
            tests: [not_null]
          - name: TVA_4
            tests: [not_null]
          - name: TVA_5
            tests: [not_null]
          - name: Marge_Rembt
            tests: [not_null]
          - name: Marge_NRembt
            tests: [not_null]
          - name: Remise_EnCompte
            tests: [not_null]
          - name: Remise_EnLigne
            tests: [not_null]
          - name: EnCompte_Positif
            tests: [not_null]
          - name: Mutuelle
            tests: [not_null]
          - name: EspeceEUR
            tests: [not_null]
          - name: ChequeEUR
            tests: [not_null]
          - name: Virement
            tests: [not_null]
          - name: SubroPartAssure
            tests: [not_null]
          - name: Controle
            tests: [not_null]
          - name: PointsFidel
            tests: [not_null]
          - name: Particulier
            tests: [not_null]
          - name: EnCompteBL_Positif
            tests: [not_null]
          - name: Differe_Negatif
            tests: [not_null]
          - name: EnCompte_Negatif
            tests: [not_null]
          - name: EnCompteBL_Negatif
            tests: [not_null]
          - name: CA_Retro_1
            tests: [not_null]
          - name: CA_Retro_2
            tests: [not_null]
          - name: CA_Retro_3
            tests: [not_null]
          - name: CA_Retro_4
            tests: [not_null]
          - name: CA_Retro_5
            tests: [not_null]
          - name: DMPositif
            tests: [not_null]
          - name: DMNegatif
            tests: [not_null]
          - name: DMRetroPositif
            tests: [not_null]
          - name: DMRetroNegatif
            tests: [not_null]

      # LOG (2 colonnes)
      - name: RAW_LOG
        columns:
          - name: PHA_ID
            tests: [not_null, unique]
          - name: DATE_SYNC

      # LPPR (6 colonnes)
      - name: RAW_LPPR
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: PRD_ID
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
          - name: LPP_INDEX
            tests: [not_null]
          - name: LPP_CODE
            tests: [not_null]
          - name: LPP_QTE
            tests: [not_null]
          - name: LPP_ACTE_NOM
            tests: [not_null]

      # MANQHISTORY (7 colonnes)
      - name: RAW_MANQHISTORY
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: MNQ_DATE
            tests: [not_null]
          - name: PRD_ID
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
          - name: FAC_ID
            tests: [not_null]
          - name: EN_LIGNES
            tests: [not_null]
          - name: EN_BOITES
            tests: [not_null]
          - name: EN_CLIENTS
            tests: [not_null]

      # MEDIPRIX_FACTURES (18 colonnes)
      - name: RAW_MEDIPRIX_FACTURES
        columns:
          - name: id
            tests: [not_null, unique]
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: FAC_ID
            tests: [not_null]
          - name: FAC_TI
            tests: [not_null]
          - name: FAC_DATE
          - name: FAC_HEURE
          - name: FAC_TVA
          - name: FAC_QUANTITE
            description: "Quantité facturée"
            tests:
              - dbt_utils.expression_is_true:
                  expression: "FAC_QUANTITE > 0"
          - name: FAC_PAHT
          - name: FAC_PVHT
          - name: FAC_PVTTC
          - name: FAC_PRIXPUBLIC
          - name: FAC_CODEREMBT
          - name: PRD_ID
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
          - name: PRD_EAN13
          - name: PRD_NOM
          - name: ORD_OPERATEUR
          - name: PHA_NOM
          
      # PRODUITS (23 colonnes)
      - name: RAW_PRODUITS
        description: "Catalogue produits (PK: PHA_ID, PRD_ID)"
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: PRD_ID
            description: "ID produits"
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
          - name: PRD_EAN13
            description: ""
          - name: PRD_NOM
            description: ""
          - name: PRD_IDMAJPRD
            description: ""
          - name: FOU_ID
            tests:
              - relationships:
                  to: ref('stg_fournisseurs')
                  field: FOU_ID
          - name: PRD_CODEREMBT
            description: ""
          - name: PRD_CODEACTE
            description: ""
          - name: PRD_FIRSTSTOCK
            description: ""
          - name: PRD_TVA
            description: ""
          - name: PRD_NTVA
            description: ""
          - name: PRD_CREATE
            description: ""
          - name: PRD_STOCK
            description: ""
          - name: PRD_PRIXTARIF
            description: ""
            tests:
              - dbt_utils.expression_is_true:
                  expression: "PRD_PRIXTARIF > 0"
          - name: PRD_DERN_VENTE
            description: ""
          - name: PRD_DERN_ACHAT
            description: ""
          - name: PRD_FLAG3
            description: ""
          - name: PRD_REFGEN
            description: ""
          - name: PRD_EN_STOCK
            description: ""
          - name: PRD_EN_COMMANDE
            description: ""
          - name: PRD_EN_PROMIS
            description: ""
          - name: PRD_DELETED
            description: ""
          - name: PRD_ONLYPROMIS
            description: ""

      # PRODUITS_NEGATIFS (2 colonnes)
      - name: RAW_PRODUITS_NEGATIFS
        columns:
          - name: PRD_ID
            description: "ID du produit"
            tests: [not_null, unique]
          - name: PRD_NOM
            description: "Nom du produit"
          
      # STOCKHISTORY (9 colonnes)
      - name: RAW_STOCKHISTORY
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: PRD_ID
            description: "ID produits"
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
          - name: STH_DATE
            tests: [not_null]
          - name: STH_STOCKDELTA
            tests: [not_null]
          - name: STH_STOCK
            description: ""
          - name: STH_PRIXTARIF
            description: ""
          - name: STH_PRIXPUBLIC
            description: ""
          - name: STH_PAMP
            description: ""
          - name: STH_PANET
            description: ""

      # pharmacies (8 colonnes)
      - name: RAW_PHARMACIES 
        columns:
          - name: id
            description: "ID pharmacies"
            tests: [not_null, unique]
          - name: adeli
            description: ""
          - name: name
            description: ""
          - name: phone
            description: ""
          - name: city
            description: ""
          - name: postal_code
            description: ""
          - name: parent_id
            description: ""
          - name: left_groupment
            description: ""
            tests: [not_null]
          
      # pharmacies_erreur (3 colonnes)
      - name: RAW_PHARMACIES_ERREUR
        columns:
          - name: id
            description: ""
          - name: code_erreur
            description: ""
          - name: date_erreur
            description: ""

  - name: kafka_cdc
    description: "Debezium CDC - winstat_rds.winstat.* topics"
    database: MEDICORE
    schema: RAW
    tables:
      # COMMANDES (PK: PHA_ID, COM_GROI, PRD_ID)
      - name: winstat_commandes
        description: "CDC winstat_rds.winstat.COMMANDES"
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: _cdc_ts_ms
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: COM_GROI
            description: "Gros commande"
            tests: [not_null]
          - name: PRD_ID
            description: "ID produit"
            tests: [not_null]

      # FACTURES (PK: PHA_ID, FAC_ID, FAC_TI)
      - name: winstat_factures
        description: "CDC winstat_rds.winstat.FACTURES"
        freshness:
          warn_after: {count: 6, period: hour}
        loaded_at_field: _cdc_ts_ms
        columns:
          - name: PHA_ID
            tests: [not_null]
          - name: FAC_ID
            tests: [not_null]
          - name: FAC_TI
            tests: [not_null]

      # ORDERS (PK: PHA_ID, FAC_ID)
      - name: winstat_orders
        description: "CDC winstat_rds.winstat.ORDERS"
        freshness:
          warn_after: {count: 6, period: hour}
        loaded_at_field: _cdc_ts_ms

      # PHARMACIE (PK: PHA_ID)
      - name: winstat_pharmacie
        description: "CDC winstat_rds.winstat.PHARMACIE"
        loaded_at_field: _cdc_ts_ms
        columns:
          - name: PHA_ID
            tests: [not_null, unique]

      # MODSTOCK (PK: PHA_ID, MOD_DATE, PRD_ID)
      - name: winstat_modstock
        description: "CDC winstat_rds.winstat.MODSTOCK"
        freshness:
          warn_after: {count: 12, period: hour}
        loaded_at_field: _cdc_ts_ms
        columns:
          - name: PHA_ID
            tests: [not_null]
          - name: PRD_ID
            tests: [not_null]

      # DAYBYDAY (PK: PHA_ID, DBD_DATE, PRD_ID)
      - name: winstat_daybyday
        description: "CDC winstat_rds.winstat.DAYBYDAY"
        freshness:
          warn_after: {count: 12, period: hour}
        loaded_at_field: _cdc_ts_ms
        columns:
          - name: PHA_ID
            tests: [not_null]
          - name: DBD_DATE
            tests: [not_null]
          - name: PRD_ID
            tests: [not_null]
