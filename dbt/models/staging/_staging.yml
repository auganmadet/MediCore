version: 2

models:
  - name: stg_commandes
    description: "Commandes nettoyées et dédupliquées"
    columns:
      - name: PHA_ID
        tests: [not_null]
      - name: COM_GROI
        tests: [not_null]
      - name: PRD_ID
        tests: [not_null]
      - name: COM_QUANTITE
        tests:
          - dbt_utils.expression_is_true:
              expression: "COM_QUANTITE > 0"

  - name: stg_daybyday
    description: "Prix journaliers nettoyés"
    columns:
      - name: PHA_ID
        tests: [not_null]
      - name: DBD_DATE
        tests: [not_null]
      - name: PRD_ID
        tests: [not_null]

  - name: stg_ean13
    description: "Mapping EAN13 par produit"
    columns:
      - name: PHA_ID
        tests: [not_null]
      - name: PRD_ID
        tests: [not_null]
      - name: EAN_13
        tests: [not_null]

  - name: stg_factures
    description: "Factures nettoyées et dédupliquées"
    columns:
      - name: PHA_ID
        tests: [not_null]
      - name: FAC_ID
        tests: [not_null]
      - name: FAC_TI
        tests: [not_null]
      - name: FAC_DATE
        tests: [not_null]
      - name: PRD_ID
        tests: [not_null]
      - name: FAC_QUANTITE
        tests:
          - dbt_utils.expression_is_true:
              expression: "FAC_QUANTITE > 0"

  - name: stg_fournisseurs
    description: "Fournisseurs nettoyés"
    columns:
      - name: PHA_ID
        tests: [not_null]
      - name: FOU_ID
        tests: [not_null]

  - name: stg_history
    description: "Historique CA journalier nettoyé"
    columns:
      - name: PHA_ID
        tests: [not_null]
      - name: Date
        tests: [not_null]

  - name: stg_log
    description: "Logs de synchronisation"
    columns:
      - name: PHA_ID
        tests: [not_null, unique]

  - name: stg_lppr
    description: "LPPR par produit"
    columns:
      - name: PHA_ID
        tests: [not_null]
      - name: PRD_ID
        tests: [not_null]
      - name: LPP_INDEX
        tests: [not_null]
      - name: LPP_CODE
        tests: [not_null]

  - name: stg_manqhistory
    description: "Historique manquants"
    columns:
      - name: PHA_ID
        tests: [not_null]
      - name: MNQ_DATE
        tests: [not_null]
      - name: PRD_ID
        tests: [not_null]
      - name: FAC_ID
        tests: [not_null]

  - name: stg_mediprix_factures
    description: "Factures Mediprix nettoyées"
    columns:
      - name: id
        tests: [not_null, unique]
      - name: PHA_ID
        tests: [not_null]
      - name: FAC_ID
        tests: [not_null]
      - name: FAC_TI
        tests: [not_null]
      - name: FAC_QUANTITE
        tests:
          - dbt_utils.expression_is_true:
              expression: "FAC_QUANTITE > 0"

  - name: stg_modstock
    description: "Mouvements de stock"
    columns:
      - name: PHA_ID
        tests: [not_null]
      - name: MOD_DATE
        tests: [not_null]
      - name: PRD_ID
        tests: [not_null]
      - name: MOD_TIMESTAMP
        tests: [not_null]

  - name: stg_orders
    description: "Ordres / ordonnances"
    columns:
      - name: PHA_ID
        tests: [not_null]
      - name: FAC_ID
        tests: [not_null]
      - name: ORD_DATE
        tests: [not_null]

  - name: stg_pharmacie
    description: "Pharmacie master"
    columns:
      - name: PHA_ID
        tests: [not_null, unique]
      - name: PHA_NOM
        tests: [not_null]

  - name: stg_produits
    description: "Catalogue produits nettoyé"
    columns:
      - name: PHA_ID
        tests: [not_null]
      - name: PRD_ID
        tests: [not_null]
      - name: PRD_NOM
        tests: [not_null]
      - name: PRD_PRIXTARIF
        description: ""
        tests:
          - dbt_utils.expression_is_true:
              expression: "PRD_PRIXTARIF > 0"

  - name: stg_produits_negatifs
    description: "Produits négatifs"
    columns:
      - name: PRD_ID
        tests: [not_null, unique]

  - name: stg_stockhistory
    description: "Historique stock"
    columns:
      - name: PHA_ID
        tests: [not_null]
      - name: PRD_ID
        tests: [not_null]
      - name: STH_DATE
        tests: [not_null]

  - name: stg_pharmacies
    description: "Pharmacies référentiel externe"
    columns:
      - name: id
        tests: [not_null, unique]
      - name: left_groupment
        tests: [not_null]

  - name: stg_pharmacies_erreur
    description: "Erreurs de mapping pharmacies"
    columns:
      - name: id
      - name: code_erreur
      - name: date_erreur
