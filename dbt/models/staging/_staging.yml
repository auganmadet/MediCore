version: 2

models:
  - name: stg_commandes
    description: "Commandes nettoyées et dédupliquées (source: RAW_COMMANDES ← winstat.COMMANDES)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_COMMANDES.PHA_ID ← winstat.COMMANDES.PHA_ID)"
        tests: [not_null]
      - name: COM_GROI
        description: "ID grossiste (source: RAW_COMMANDES.COM_GROI ← winstat.COMMANDES.COM_GROI)"
        tests: [not_null]
      - name: PRD_ID
        description: "ID produit (source: RAW_COMMANDES.PRD_ID ← winstat.COMMANDES.PRD_ID)"
        tests:
          - not_null
          - relationships:
              to: ref('stg_produits')
              field: PRD_ID
              config:
                severity: warn
      - name: FOU_ID
        description: "ID fournisseur (source: RAW_COMMANDES.FOU_ID ← winstat.COMMANDES.FOU_ID)"
        tests:
          - relationships:
              to: ref('stg_fournisseurs')
              field: FOU_ID
              config:
                severity: warn
      - name: COM_QUANTITE
        description: "Quantité commandée (peut être négative pour annulations)"

  - name: stg_daybyday
    description: "Prix journaliers nettoyés (source: RAW_DAYBYDAY ← winstat.DAYBYDAY)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_DAYBYDAY.PHA_ID)"
        tests: [not_null]
      - name: DBD_DATE
        description: "Date du jour (source: RAW_DAYBYDAY.DBD_DATE)"
        tests: [not_null]
      - name: PRD_ID
        description: "ID produit"
        tests:
          - not_null
          - relationships:
              to: ref('stg_produits')
              field: PRD_ID
              config:
                severity: warn

  - name: stg_ean13
    description: "Mapping EAN13 par produit (source: RAW_EAN13 ← winstat.EAN13)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_EAN13.PHA_ID)"
        tests: [not_null]
      - name: PRD_ID
        description: "ID produit"
        tests:
          - not_null
          - relationships:
              to: ref('stg_produits')
              field: PRD_ID
              config:
                severity: warn
      - name: EAN_13
        description: "Code-barres EAN13 du produit (13 chiffres)"
        tests: [not_null]

  - name: stg_factures
    description: "Factures nettoyées et dédupliquées (source: RAW_FACTURES ← winstat.FACTURES)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_FACTURES.PHA_ID ← winstat.FACTURES.PHA_ID)"
        tests: [not_null]
      - name: FAC_ID
        description: "ID facture (source: RAW_FACTURES.FAC_ID ← winstat.FACTURES.FAC_ID)"
        tests: [not_null]
      - name: FAC_TI
        description: "Type item facture (source: RAW_FACTURES.FAC_TI)"
        tests: [not_null]
      - name: FAC_DATE
        description: "Date facture (source: RAW_FACTURES.FAC_DATE)"
        tests: [not_null]
      - name: PRD_ID
        description: "ID produit"
        tests:
          - not_null
          - relationships:
              to: ref('stg_produits')
              field: PRD_ID
              config:
                severity: warn
      - name: FAC_QUANTITE
        description: "Quantité facturée (peut être négative pour retours)"

  - name: stg_fournisseurs
    description: "Fournisseurs nettoyés (source: RAW_FOURNISSEURS ← winstat.FOURNISSEURS)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_FOURNISSEURS.PHA_ID)"
        tests: [not_null]
      - name: FOU_ID
        description: "ID fournisseur (source: RAW_FOURNISSEURS.FOU_ID)"
        tests: [not_null]

  - name: stg_history
    description: "Historique CA journalier nettoyé (source: RAW_HISTORY ← winstat.HISTORY)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_HISTORY.PHA_ID)"
        tests: [not_null]
      - name: '"Date"'
        description: "Date historique (peut être NULL pour anciens enregistrements)"

  - name: stg_log
    description: "Logs de synchronisation (source: RAW_LOG ← winstat.LOG)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_LOG.PHA_ID)"
        tests: [not_null, unique]
      - name: DATE_SYNC
        description: "Date/heure de la dernière synchronisation des données"

  - name: stg_lppr
    description: "LPPR par produit (source: RAW_LPPR ← winstat.LPPR)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_LPPR.PHA_ID)"
        tests: [not_null]
      - name: PRD_ID
        description: "ID produit"
        tests:
          - not_null
          - relationships:
              to: ref('stg_produits')
              field: PRD_ID
              config:
                severity: warn
      - name: LPP_INDEX
        description: "Index dans la liste LPP"
        tests: [not_null]
      - name: LPP_CODE
        description: "Code LPP (Liste des Produits et Prestations Remboursables)"
        tests: [not_null]

  - name: stg_manqhistory
    description: "Historique manquants (source: RAW_MANQHISTORY ← winstat.MANQHISTORY)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_MANQHISTORY.PHA_ID)"
        tests: [not_null]
      - name: MNQ_DATE
        description: "Date manquant (source: RAW_MANQHISTORY.MNQ_DATE)"
        tests: [not_null]
      - name: PRD_ID
        description: "ID produit en rupture"
        tests:
          - not_null
          - relationships:
              to: ref('stg_produits')
              field: PRD_ID
              config:
                severity: warn
      - name: FAC_ID
        description: "ID facture associée à la demande non servie"
        tests: [not_null]

  - name: stg_mediprix_factures
    description: "Factures Mediprix nettoyées (source: RAW_MEDIPRIX_FACTURES ← winstat.MEDIPRIX_FACTURES)"
    columns:
      - name: ID
        description: "Identifiant unique de la ligne de facture"
        tests: [not_null, unique]
      - name: PHA_ID
        description: "ID pharmacie"
        tests: [not_null]
      - name: FAC_ID
        description: "ID facture"
        tests: [not_null]
      - name: FAC_TI
        description: "Type d'identification (tiers payant)"
        tests: [not_null]
      - name: FAC_QUANTITE
        description: "Quantité facturée (peut être négative pour retours)"

  - name: stg_modstock
    description: "Mouvements de stock (source: RAW_MODSTOCK ← winstat.MODSTOCK)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_MODSTOCK.PHA_ID ← winstat.MODSTOCK.PHA_ID)"
        tests: [not_null]
      - name: MOD_DATE
        description: "Date mouvement (source: RAW_MODSTOCK.MOD_DATE ← winstat.MODSTOCK.MOD_DATE)"
        tests: [not_null]
      - name: PRD_ID
        description: "ID produit"
        tests:
          - not_null
          - relationships:
              to: ref('stg_produits')
              field: PRD_ID
              config:
                severity: warn
      - name: MOD_TIMESTAMP
        description: "Timestamp du mouvement de stock (précision seconde)"
        tests: [not_null]

  - name: stg_orders
    description: "Ordres / ordonnances (source: RAW_ORDERS ← winstat.ORDERS)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_ORDERS.PHA_ID ← winstat.ORDERS.PHA_ID)"
        tests: [not_null]
      - name: FAC_ID
        description: "ID facture (source: RAW_ORDERS.FAC_ID ← winstat.ORDERS.FAC_ID)"
        tests: [not_null]
      - name: ORD_DATE
        description: "Date ordonnance (source: RAW_ORDERS.ORD_DATE)"
        tests: [not_null]

  - name: stg_pharmacie
    description: "Pharmacie master (source: RAW_PHARMACIE ← winstat.PHARMACIE)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_PHARMACIE.PHA_ID ← winstat.PHARMACIE.PHA_ID)"
        tests: [not_null, unique]
      - name: PHA_NOM
        description: "Nom pharmacie masqué MD5 (source: RAW_PHARMACIE.PHA_NOM, masqué via mask_pii)"
        tests: [not_null]

  - name: stg_produits
    description: "Catalogue produits nettoyé (source: RAW_PRODUITS ← winstat.PRODUITS)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_PRODUITS.PHA_ID)"
        tests: [not_null]
      - name: PRD_ID
        description: "ID produit (source: RAW_PRODUITS.PRD_ID ← winstat.PRODUITS.PRD_ID)"
        tests: [not_null]
      - name: PRD_NOM
        description: "Nom produit (source: RAW_PRODUITS.PRD_NOM)"
        tests: [not_null]
      - name: FOU_ID
        description: "ID fournisseur principal"
        tests:
          - relationships:
              to: ref('stg_fournisseurs')
              field: FOU_ID
              config:
                severity: warn
      - name: PRD_PRIXTARIF
        description: "Prix tarif (peut être 0 ou négatif pour produits spéciaux)"

  - name: stg_produits_negatifs
    description: "Produits négatifs (source: RAW_PRODUITS_NEGATIFS ← winstat.PRODUITS_NEGATIFS)"
    columns:
      - name: PRD_ID
        description: "ID produit ayant un stock négatif"
        tests: [not_null, unique]

  - name: stg_stockhistory
    description: "Historique stock (source: RAW_STOCKHISTORY ← winstat.STOCKHISTORY)"
    columns:
      - name: PHA_ID
        description: "ID pharmacie (source: RAW_STOCKHISTORY.PHA_ID)"
        tests: [not_null]
      - name: PRD_ID
        description: "ID produit"
        tests:
          - not_null
          - relationships:
              to: ref('stg_produits')
              field: PRD_ID
              config:
                severity: warn
      - name: STH_DATE
        description: "Date du mouvement de stock"
        tests: [not_null]

  - name: stg_pharmacies
    description: "Pharmacies référentiel externe (source: RAW_PHARMACIES ← winstat.pharmacies)"
    columns:
      - name: ID
        description: "ID pharmacie (référentiel Mediprix)"
        tests: [not_null, unique]
      - name: ADELI
        description: "Numéro ADELI (identifiant national de la pharmacie)"
      - name: NAME
        description: "Nom de la pharmacie (raison sociale)"
      - name: PHONE
        description: "Numéro de téléphone"
      - name: CITY
        description: "Ville"
      - name: POSTAL_CODE
        description: "Code postal"
      - name: PARENT_ID
        description: "ID de la pharmacie parente (groupement)"
      - name: LEFT_GROUPMENT
        description: "Indicateur de sortie du groupement (0=membre, 1=sorti)"
        tests: [not_null]

  - name: stg_pharmacies_erreur
    description: "Erreurs de mapping pharmacies (source: RAW_PHARMACIES_ERREUR ← winstat.pharmacies_erreur)"
    columns:
      - name: ID
        description: "ID de la pharmacie en erreur"
      - name: CODE_ERREUR
        description: "Code d'erreur de synchronisation"
      - name: DATE_ERREUR
        description: "Date de l'erreur"
