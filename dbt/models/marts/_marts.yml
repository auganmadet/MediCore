version: 2

models:
  # DIMENSIONS
  - name: dim_pharmacie
    description: "Pharmacies (table de référence, source: stg_pharmacie ← RAW_PHARMACIE)"
    columns:
      - name: pharmacie_sk
        description: "Surrogate key (ROW_NUMBER sur stg_pharmacie.PHA_ID)"
        tests:
          - unique
          - not_null
      - name: PHA_ID
        description: "Business key pharmacie (source: stg_pharmacie.PHA_ID ← RAW_PHARMACIE.PHA_ID)"
        tests:
          - unique
          - not_null
      - name: PHA_NOM
        tests:
          - not_null

  - name: dim_produit
    description: "Produits enrichis EAN13 + LPPR + classification (sources: stg_produits + stg_ean13 + stg_lppr)"
    columns:
      - name: produit_sk
        tests:
          - unique
          - not_null
      - name: PRD_ID
        tests:
          - not_null
      - name: PRD_NOM
        tests:
          - not_null
      - name: PRD_EAN13
      - name: LPP_CODE
      - name: FOU_ID
      - name: is_generique
        description: "true si produit generique (PRD_REFGEN in 71, 82)"
      - name: univers
        description: "Classification: RX (ordonnance), OTC (conseil), PARA, HORS_REMB, AUTRE"
      - name: derniere_vente
        description: "Date de derniere vente du produit"

  - name: dim_fournisseur
    description: "Fournisseurs hiérarchiques (source: stg_fournisseurs ← RAW_FOURNISSEURS)"
    columns:
      - name: fournisseur_sk
        tests:
          - unique
          - not_null
      - name: FOU_ID
        tests:
          - not_null
      - name: FOU_NOM
        tests:
          - not_null

  # FAITS
  - name: fact_ventes
    description: "Ventes journalières agrégées (sources: stg_factures + dim_pharmacie + dim_produit)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_pharmacie')
              field: pharmacie_sk
      - name: produit_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_produit')
              field: produit_sk
      - name: date_vente
        tests:
          - not_null
      - name: quantite_vendue
        description: "Quantité facturée (peut être négatif pour retours)"
        tests:
          - not_null
      - name: ca_ht
        description: "Chiffre d'affaires HT (peut être négatif pour avoirs)"
        tests:
          - not_null
      - name: ca_ttc
        description: "Chiffre d'affaires TTC (peut être négatif pour avoirs)"
        tests:
          - not_null

  - name: fact_commandes
    description: "Commandes fournisseurs (sources: stg_commandes + dim_pharmacie + dim_produit + dim_fournisseur)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_pharmacie')
              field: pharmacie_sk
      - name: fournisseur_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_fournisseur')
              field: fournisseur_sk
      - name: produit_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_produit')
              field: produit_sk
      - name: date_commande
        tests:
          - not_null
      - name: quantite_commandee
        description: "Quantité commandée (peut être négative pour annulations)"
        tests:
          - not_null
      - name: montant_pahtnet
        description: "Montant prix achat HT net (peut être négatif pour avoirs)"

  - name: fact_stock_mouvement
    description: "Mouvements stock granulaire (sources: stg_modstock + dim_pharmacie + dim_produit)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_pharmacie')
              field: pharmacie_sk
      - name: produit_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_produit')
              field: produit_sk
      - name: date_mouvement
        tests:
          - not_null
      - name: delta_stock
        tests:
          - not_null

  - name: fact_prix_journalier
    description: "Prix évolutifs par jour (sources: stg_daybyday + dim_pharmacie + dim_produit)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_pharmacie')
              field: pharmacie_sk
      - name: produit_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_produit')
              field: produit_sk
      - name: date_prix
        tests:
          - not_null
      - name: prix_tarif
        description: "Prix tarif (peut être 0 pour produits gratuits)"
      - name: prix_public
        description: "Prix public TTC (peut être 0 pour produits gratuits)"
      - name: prix_achat_moyen_pondere
        description: "PAMP (peut être 0)"
      - name: prix_achat_net
        description: "Prix achat net (peut être 0)"

  # KPIs CROISES
  - name: mart_kpi_marge
    description: "Marge journalière par pharmacie et produit (sources: fact_ventes + fact_prix_journalier)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: produit_sk
        tests:
          - not_null
      - name: date_jour
        tests:
          - not_null
      - name: marge_brute
        tests:
          - not_null
      - name: taux_marge
        description: "Ratio marge_brute / ca_ht (null si ca_ht = 0)"

  - name: mart_kpi_stock
    description: "Rotation de stock et taux de rupture mensuels (sources: fact_stock_mouvement + fact_ventes)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: produit_sk
        tests:
          - not_null
      - name: mois
        tests:
          - not_null
      - name: stock_moyen
        tests:
          - not_null
      - name: taux_rupture_stock
        description: "Ratio jours a stock zero / jours avec mouvement (vue stock, source: MODSTOCK)"
      - name: rotation_stock
        description: "Ratio quantite_vendue / stock_moyen (null si stock_moyen = 0)"

  - name: mart_kpi_ecoulement
    description: "Taux d'écoulement mensuel (sources: fact_commandes + fact_ventes)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: produit_sk
        tests:
          - not_null
      - name: mois
        tests:
          - not_null
      - name: taux_ecoulement
        description: "Ratio quantite_vendue / quantite_commandee (null si aucune commande)"

  - name: fact_ruptures
    description: "Ruptures de stock journalieres par pharmacie et produit (sources: stg_manqhistory + dim_pharmacie + dim_produit)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_pharmacie')
              field: pharmacie_sk
      - name: produit_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_produit')
              field: produit_sk
      - name: date_rupture
        tests:
          - not_null
      - name: nb_lignes_manquantes
        description: "Nombre de lignes de commande non satisfaites"
        tests:
          - not_null
      - name: nb_boites_manquantes
        description: "Nombre de boites non delivrees"
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              severity: warn
      - name: nb_clients_impactes
        description: "Nombre de clients ayant subi la rupture"
        tests:
          - not_null

  - name: mart_kpi_ruptures
    description: "Impact des ruptures et estimation CA/marge perdus mensuels (sources: fact_ruptures + fact_ventes + fact_prix_journalier)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: produit_sk
        tests:
          - not_null
      - name: mois
        tests:
          - not_null
      - name: taux_rupture_demande
        description: "Ratio lignes non satisfaites / total lignes (vue demande client, source: MANQHISTORY)"
      - name: ca_estime_perdu
        description: "Boites manquantes * prix public moyen du mois (null si prix inconnu)"
      - name: marge_estimee_perdue
        description: "Boites manquantes * (prix public - prix achat) moyen du mois"

  - name: fact_tresorerie
    description: "Tresorerie journaliere par pharmacie (sources: stg_history + dim_pharmacie)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_pharmacie')
              field: pharmacie_sk
      - name: date_jour
        tests:
          - not_null
      - name: ca_total_jour
        description: "CA total jour (peut être négatif pour avoirs)"
        tests:
          - not_null
      - name: montant_especes
        description: "Encaissements espèces (peut être négatif)"
      - name: montant_cb
        description: "Encaissements CB (peut être négatif)"
      - name: montant_mutuelle
        description: "Encaissements mutuelle (peut être négatif)"
      - name: montant_virement
        description: "Encaissements virement (peut être négatif)"
      - name: marge_totale
        tests:
          - not_null

  - name: mart_kpi_tresorerie
    description: "Tresorerie mensuelle : panier moyen, repartition paiements, marges (source: fact_tresorerie)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: mois
        tests:
          - not_null
      - name: ca_total
        tests:
          - not_null
      - name: panier_moyen
        description: "CA total / nb factures (null si aucune facture)"
      - name: pct_tiers_payant
        description: "Part (mutuelle + centre + subrogation) / CA total"
      - name: pct_marge_remboursable
        description: "Part marge remboursable / marge totale"

  - name: fact_stock_valorisation
    description: "Snapshots stock quotidiens valorises par pharmacie et produit (sources: stg_stockhistory + dim_pharmacie + dim_produit)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_pharmacie')
              field: pharmacie_sk
      - name: produit_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_produit')
              field: produit_sk
      - name: date_stock
        tests:
          - not_null
      - name: valeur_stock_pa
        description: "Valeur stock prix achat (peut être négatif si stock négatif)"
      - name: valeur_stock_pv
        description: "Valeur stock prix vente (peut être négatif si stock négatif)"
      - name: marge_latente
        description: "Valeur PV - valeur PA (marge en rayon non réalisée)"
      - name: prix_tarif
        description: "Prix tarif unitaire (peut être 0)"
      - name: prix_public
        description: "Prix public unitaire (peut être 0)"
      - name: prix_achat_moyen_pondere
        description: "PAMP (peut être 0)"
      - name: prix_achat_net
        description: "Prix achat net (peut être 0)"

  - name: mart_kpi_stock_valorisation
    description: "Valorisation stock, couverture en jours, detection stock dormant et inflation (sources: fact_stock_valorisation + fact_ventes)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: produit_sk
        tests:
          - not_null
      - name: mois
        tests:
          - not_null
      - name: couverture_stock_jours
        description: "Stock fin mois * 30 / quantite vendue (null si aucune vente)"
      - name: variation_prix_achat
        description: "Variation relative du prix achat net dans le mois (detection inflation)"
      - name: stock_dormant
        description: "true si stock moyen > 0 et aucune vente dans le mois"

  - name: mart_kpi_qualite_donnees
    description: "Fraicheur des donnees et erreurs de synchronisation par pharmacie (sources: stg_log + stg_pharmacies_erreur + dim_pharmacie)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: PHA_NOM
        tests:
          - not_null
      - name: statut_fraicheur
        description: "OK (<= 24h), ALERTE (24-48h), CRITIQUE (> 48h)"
      - name: heures_depuis_sync
        description: "Nombre d'heures depuis la derniere synchronisation"
      - name: taux_pharmacies_ok
        description: "Part des pharmacies avec statut OK"

  - name: fact_operateur
    description: "Ventes horaires par operateur et pharmacie (sources: stg_mediprix_factures + stg_orders + dim_pharmacie)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_pharmacie')
              field: pharmacie_sk
      - name: operateur
        tests:
          - not_null
      - name: date_vente
        tests:
          - not_null
      - name: ca_ttc
        description: "CA TTC opérateur (peut être négatif pour avoirs)"
        tests:
          - not_null
      - name: ca_ht
        description: "CA HT opérateur (peut être négatif pour avoirs)"
      - name: cout_achat_ht
        description: "Coût d'achat HT (peut être négatif)"
      - name: nb_clients_distincts
        description: "Nombre de clients distincts servis (via ORD_CLI_TI)"

  - name: mart_kpi_operateur
    description: "Performance operateur mensuelle : CA, panier moyen, marge, clients par jour, mix rembourse/libre, heure de pic (source: fact_operateur)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: operateur
        tests:
          - not_null
      - name: mois
        tests:
          - not_null
      - name: nb_clients_total
        description: "Nombre total de clients distincts servis dans le mois"
      - name: nb_clients_par_jour
        description: "Nombre moyen de clients servis par jour (nb_clients_total / nb_jours_activite)"
      - name: panier_moyen
        description: "CA TTC / nb lignes (null si aucune ligne)"
      - name: taux_marge
        description: "Ratio (CA HT - cout achat) / CA HT"
      - name: pct_lignes_remboursables
        description: "Part des lignes avec code remboursement"
      - name: heure_pic_ca
        description: "Heure de la journee avec le plus de CA TTC"

  - name: mart_kpi_abc
    description: "Classification ABC mensuelle des produits par pharmacie (sources: fact_ventes + dim_pharmacie + dim_produit)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: produit_sk
        tests:
          - not_null
      - name: mois
        tests:
          - not_null
      - name: rang
        description: "Rang du produit par CA decroissant dans la pharmacie"
      - name: pct_ca_cumule
        description: "Pourcentage cumule du CA (pour tracer la courbe de Pareto)"
      - name: classe_abc
        description: "A (top 80% CA), B (80-95%), C (> 95%)"

  - name: mart_kpi_ca_evolution
    description: "Evolution du CA : année N vs N-1, cumul YTD, 12 derniers mois glissants (source: fact_ventes)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: mois
        tests:
          - not_null
      - name: ca_ht
        description: "CA HT du mois"
      - name: evolution_ca_ht_vs_a1
        description: "Variation CA HT vs meme mois A-1 (ratio)"
      - name: ca_ht_ytd
        description: "CA HT cumule depuis debut d'annee (Year-To-Date)"
      - name: evolution_ytd_vs_a1
        description: "Variation YTD vs YTD A-1"
      - name: ca_ht_12dm
        description: "CA HT sur les 12 derniers mois glissants"
      - name: evolution_12dm_vs_a1
        description: "Variation 12DM vs 12DM A-1"

  - name: mart_kpi_generique
    description: "KPIs generiques et parts de marche laboratoires par pharmacie (sources: fact_ventes + dim_produit + dim_fournisseur)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: mois
        tests:
          - not_null
      - name: FOU_ID
        description: "Identifiant fournisseur/laboratoire"
      - name: FOU_NOM
        description: "Nom du laboratoire"
      - name: is_generique
        description: "true si produit generique"
      - name: univers
        description: "Classification: RX (ordonnance), OTC (conseil), PARA, HORS_REMB"
      - name: pdm_labo
        description: "Part de marche du labo dans la pharmacie (CA labo / CA total)"
      - name: taux_generique_pharmacie
        description: "Taux de generique global de la pharmacie"
      - name: evolution_vs_a1
        description: "Variation CA vs meme mois A-1"

  - name: mart_kpi_dormant
    description: "Produits dormants (sans vente 6/12 mois) avec valorisation stock immobilise (sources: dim_produit + fact_ventes + fact_stock_valorisation)"
    columns:
      - name: produit_sk
        tests:
          - not_null
      - name: pharmacie_sk
        tests:
          - not_null
      - name: statut_dormant
        description: "ACTIF, DORMANT_3M, DORMANT_6M, DORMANT_12M, JAMAIS_VENDU"
      - name: jours_sans_vente
        description: "Nombre de jours depuis la derniere vente"
      - name: is_dormant_6m
        description: "true si aucune vente depuis 6 mois"
      - name: is_dormant_12m
        description: "true si aucune vente depuis 12 mois"
      - name: valeur_stock_pa
        description: "Valeur du stock au prix d'achat (capital immobilise)"
      - name: marge_latente_bloquee
        description: "Marge potentielle bloquee dans le stock dormant"

  - name: mart_kpi_remise_labo
    description: "Remise ponderee par laboratoire et pharmacie (source: fact_commandes + dim_fournisseur)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: FOU_ID
        description: "Identifiant du laboratoire/fournisseur"
        tests:
          - not_null
      - name: laboratoire
        description: "Nom du laboratoire"
      - name: mois
        tests:
          - not_null
      - name: nb_commandes
        description: "Nombre de commandes passees au labo"
      - name: quantite_commandee
        description: "Quantite totale commandee"
      - name: montant_pahtnet
        description: "Montant total HT net des commandes"
      - name: remise_moyenne_simple
        description: "Moyenne arithmetique des taux de remise"
      - name: remise_ponderee_qte
        description: "Remise moyenne ponderee par quantite"
      - name: remise_ponderee_montant
        description: "Remise moyenne ponderee par montant (KPI principal)"

  - name: mart_kpi_univers
    description: "KPIs par univers (RX, OTC, PARA, HORS_REMB) - pret pour dashboard (source: mart_kpi_generique)"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: mois
        tests:
          - not_null
      - name: univers
        description: "Univers produit: RX, OTC, PARA, HORS_REMB, AUTRE"
        tests:
          - not_null
      - name: ca_ht
        description: "CA HT de l'univers"
      - name: marge_brute
        description: "Marge brute de l'univers"
      - name: taux_marge
        description: "Taux de marge de l'univers"
      - name: pct_ca_univers
        description: "Part du CA de l'univers dans le CA total pharmacie"
      - name: pct_marge_univers
        description: "Part de la marge de l'univers dans la marge totale"
      - name: evolution_ca_vs_a1
        description: "Evolution CA vs annee precedente"

  - name: mart_kpi_synthese_pharmacie
    description: "Synthese KPIs par pharmacie/mois - PRET POUR DASHBOARD, aucun calcul supplementaire requis"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: mois
        tests:
          - not_null
      - name: ca_ht
        description: "CA HT mensuel"
      - name: evolution_ca_vs_a1
        description: "Evolution CA vs A-1"
      - name: ca_ht_ytd
        description: "CA HT cumule annee en cours"
      - name: evolution_ytd_vs_a1
        description: "Evolution YTD vs A-1"
      - name: marge_brute
        description: "Marge brute totale"
      - name: taux_marge
        description: "Taux de marge global"
      - name: valeur_stock_pa
        description: "Valeur stock au prix d'achat"
      - name: ratio_stock_ca_annuel_pct
        description: "Ratio valeur stock / CA annuel en % (KPI cle)"
      - name: ca_ht_generique
        description: "CA HT des generiques"
      - name: taux_generique
        description: "Part des generiques dans le CA"
      - name: taux_marge_generique
        description: "Taux de marge sur les generiques"
      - name: pct_dormants_6m
        description: "% produits sans vente > 6 mois"
      - name: pct_dormants_12m
        description: "% produits sans vente > 12 mois"
