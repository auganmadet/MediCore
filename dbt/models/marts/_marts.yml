version: 2

models:
  # DIMENSIONS
  - name: dim_pharmacie
    description: "Pharmacies slowly changing dimension"
    columns:
      - name: pharmacie_sk
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: PHA_ID
        description: "Business key pharmacie"
        tests:
          - unique
          - not_null
      - name: PHA_NOM
        tests:
          - not_null
      - name: valid_from
        description: "SCD2 valid from"
      - name: valid_to
        description: "SCD2 valid to"

  - name: dim_produit
    description: "Produits enrichis (EAN13 + LPPR)"
    columns:
      - name: produit_sk
        tests:
          - unique
          - not_null
      - name: PRD_ID
        tests:
          - not_null
      - name: PRD_NOM
        tests:
          - not_null
      - name: PRD_EAN13
      - name: LPP_CODE
      - name: FOU_ID

  - name: dim_fournisseur
    description: "Fournisseurs hiérarchiques"
    columns:
      - name: fournisseur_sk
        tests:
          - unique
      - name: FOU_ID
        tests:
          - not_null
      - name: FOU_NOM
        tests:
          - not_null

  # FAITS
  - name: fact_ventes
    description: "Ventes journalières agrégées"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: produit_sk
        tests:
          - not_null
      - name: date_vente
        tests:
          - not_null
      - name: quantite_vendue
        description: "Quantité facturée"
        tests:
          - dbt_utils.expression_is_true:
              expression: "quantite_vendue >= 0"
      - name: ca_ht
        description: "Chiffre d'affaires HT"
        tests:
          - dbt_utils.expression_is_true:
              expression: "ca_ht >= 0"

  - name: fact_commandes
    description: "Commandes fournisseurs"
    columns:
      - name: pharmacie_sk
        tests:
          - not_null
      - name: fournisseur_sk
        tests:
          - not_null
      - name: produit_sk
        tests:
          - not_null
      - name: date_commande
      - name: quantite_commandee
        tests:
          - dbt_utils.expression_is_true:
              expression: "quantite_commandee > 0"

  - name: fact_stock_mouvement
    description: "Mouvements stock granulaire"
    columns:
      - name: pharmacie_sk
      - name: produit_sk
      - name: date_mouvement
      - name: delta_stock
        tests:
          - not_null

  - name: fact_prix_journalier
    description: "Prix évolutifs par jour"
    columns:
      - name: pharmacie_sk
      - name: produit_sk
      - name: date_prix
        tests:
          - not_null
      - name: prix_tarif
        tests:
          - dbt_utils.expression_is_true:
              expression: "prix_tarif > 0"
