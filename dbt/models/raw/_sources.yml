          - name: FAC_DATE
          - name: FAC_HEURE
          - name: FAC_TVA
          - name: FAC_QUANTITE
            description: "Quantité facturée"
            tests:
              - dbt_utils.expression_is_true:
                  expression: "FAC_QUANTITE > 0"
          - name: FAC_PAHT
          - name: FAC_PVHT
          - name: FAC_PVTTC
          - name: FAC_PRIXPUBLIC
          - name: FAC_CODEREMBT
          - name: PRD_ID
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
          - name: PRD_EAN13
          - name: PRD_NOM
          - name: ORD_OPERATEUR
          - name: PHA_NOM
          
