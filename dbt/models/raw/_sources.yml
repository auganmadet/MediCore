version: 2

sources:
  - name: mysql_raw
    schema: RAW
    database: MEDIcore
    tables:
      # COMMANDES (9 colonnes)    
      - name: RAW_COMMANDES
        description: "Lignes commandes (PK: PHA_ID, COM_GROI, PRD_ID)"
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: cdc_timestamp
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: COM_GROI
            description: "Gros commande"
            tests: [not_null]
          - name: PRD_ID
            description: "ID produit"
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
          - name: COM_GROS
            description: "Gros suivant"
            tests: [not_null]
          - name: COM_DATE
            description: "Date commande"
            tests: [not_null]
          - name: FOU_ID
            description: "ID fournisseur"
            tests:
              - relationships:
                  to: ref('stg_fournisseurs')
                  field: FOU_ID
          - name: COM_QUANTITE
            description: "Quantité commandée"
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  expression: "COM_QUANTITE > 0"
          - name: COM_PAHTNET
            description: "PA HT net"
          - name: COM_TAUXREMISE
            description: "Taux remise (%)"

      # DAYBYDAY (7 colonnes)
      - name: RAW_DAYBYDAY
        description: "Prix journaliers (PK: PHA_ID, DBD_DATE, PRD_ID)"
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: DBD_DATE
            tests: [not_null]
          - name: PRD_ID
            description: "ID produit"
            tests:
              - not_null
              - relationships:              # vérifier qu’il existe une ligne correspondante dans stg_produits (intégrité référentielle logique côté entrepôt)
                  to: ref('stg_produits')
                  field: PRD_ID
          - name: DBD_PRIXTARIF
              - not_null
              - dbt_utils.expression_is_true:
                  expression: "DBD_PRIXTARIF > 0"
          - name: DBD_PRIXPUBLIC
            tests: [not_null]
          - name: DBD_PAMP
            tests: [not_null]
          - name: DBD_PANET
          
      # EAN13 (3 colonnes)
      - name: RAW_EAN13
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: EAN_13
            tests: [not_null]
          - name: PRD_ID
            description: "ID produit"
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
            
      # FACTURES (19 colonnes)
      - name: RAW_FACTURES
        description: "Lignes factures détaillées (PK: PHA_ID, FAC_ID, FAC_TI)"
        freshness:
          warn_after: {count: 6, period: hour}
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: FAC_ID
            tests: [not_null]
          - name: FAC_TI
            tests: [not_null]
          - name: FAC_BASE
            tests: [not_null]
          - name: FAC_DATE
            tests: [not_null]
          - name: PRD_ID
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
          - name: FAC_TVA
            tests: [not_null]
          - name: FAC_QUANTITE
            tests:
              - not_null
              - dbt_utils.expression_is_true:
                  expression: "FAC_QUANTITE > 0"
          - name: FAC_PAHT
            tests: [not_null]
          - name: FAC_PVHT
            tests: [not_null]
          - name: FAC_PVTTC
            tests: [not_null]
          - name: FAC_PRIXPUBLIC
            tests: [not_null]
          - name: FAC_REMISE
            tests: [not_null]
          - name: FAC_CODEREMBT
            tests: [not_null]
          - name: FAC_HISTO_NBCLIENT
            tests: [not_null]
          - name: FAC_PROMO
            tests: [not_null]
          - name: FAC_RETRO
            tests: [not_null]
          - name: FAC_LOCATION
            tests: [not_null]
          - name: FAC_ORDO
            tests: [not_null]

      # FOURNISSEURS (12 colonnes)
      - name: RAW_FOURNISSEURS
        description: "Répertoire fournisseurs (PK: PHA_ID, FOU_ID)"
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: FOU_ID
            description: "ID fournisseur"
            tests:
              - not_null
              - unique_combination_of_columns:
                  combination_of_columns: [PHA_ID, FOU_ID]
          - name: FOU_NOM
            description: "Nom fournisseur"
          - name: FOU_ADRESSE
            description: "Adresse fournisseur"
          - name: FOU_CP
            description: "Code postal fournisseur"
          - name: FOU_VILLE
            description: "Ville fournisseur"
          - name: FOU_TYPE
            description: "Type fournisseur"
          - name: FOU_REPARTITEUR
            description: "Répartiteur fournisseur"
          - name: FOU_ETABLISSEMENT
            description: "Etablissement fournisseur"
          - name: FOU_IDCLIENT
            description: "ID client fournisseur"
          - name: FOU_URL1
            description: "URL1 fournisseur"
          - name: FOU_URL2
            description: "URL2 fournisseur"

      # HISTORY (40 colonnes)
      - name: RAW_HISTORY
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: Date
            tests: [not_null]
          - name: EspeceFRF
