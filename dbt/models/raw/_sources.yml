          - name:	Marge_NRembt
            tests: [not_null]
          - name:	Remise_EnCompte
            tests: [not_null]
          - name:	Remise_EnLigne
            tests: [not_null]
          - name:	EnCompte_Positif
            tests: [not_null]
          - name:	Mutuelle
            tests: [not_null]
          - name:	EspeceEUR
            tests: [not_null]
          - name:	ChequeEUR
            tests: [not_null]
          - name:	Virement
            tests: [not_null]
          - name:	SubroPartAssure
            tests: [not_null]
          - name:	Controle
            tests: [not_null]
          - name:	PointsFidel
            tests: [not_null]
          - name:	Particulier
            tests: [not_null]
          - name:	EnCompteBL_Positif
            tests: [not_null]
          - name:	Differe_Negatif
            tests: [not_null]
          - name:	EnCompte_Negatif
            tests: [not_null]
          - name:	EnCompteBL_Negatif
            tests: [not_null]
          - name:	CA_Retro_1
            tests: [not_null]
          - name:	CA_Retro_2
            tests: [not_null]
          - name:	CA_Retro_3
            tests: [not_null]
          - name:	CA_Retro_4
            tests: [not_null]
          - name:	CA_Retro_5
            tests: [not_null]
          - name:	DMPositif
            tests: [not_null]
          - name:	DMNegatif
            tests: [not_null]
          - name:	DMRetroPositif
            tests: [not_null]
          - name:	DMRetroNegatif
            tests: [not_null]

      # LOG (2 colonnes)
      - name: RAW_LOG
        columns:
          - name: PHA_ID
            tests: [not_null, unique]
          - name: DATE_SYNC

      # LPPR (6 colonnes)
      - name: RAW_LPPR
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: PRD_ID
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
          - name: LPP_INDEX
            tests: [not_null]
          - name: LPP_CODE
            tests: [not_null]
          - name: LPP_QTE
            tests: [not_null]
          - name: LPP_ACTE_NOM
            tests: [not_null]

      # MANQHISTORY (7 colonnes)
      - name: RAW_MANQHISTORY
        columns:
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: MNQ_DATE
            tests: [not_null]
          - name: PRD_ID
            tests:
              - not_null
              - relationships:
                  to: ref('stg_produits')
                  field: PRD_ID
          - name: FAC_ID
            tests: [not_null]
          - name: EN_LIGNES
            tests: [not_null]
          - name: EN_BOITES
            tests: [not_null]
          - name: EN_CLIENTS
