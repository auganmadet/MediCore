      # MEDIPRIX_FACTURES (18 colonnes)
      - name: RAW_MEDIPRIX_FACTURES
        columns:
          - name: id
            tests: [not_null, unique]
          - name: PHA_ID
            description: "ID pharmacie"
            tests: [not_null]
          - name: FAC_ID
            tests: [not_null]
          - name: FAC_TI
