# Pas utilisé car daily_cdc_batch.py se connecte directment via les variables d'environnement
# Configuration Snowflake pour Python connector + dbt
snowflake:
  account: "${SNOWFLAKE_ACCOUNT}"
  user: "${SNOWFLAKE_USER}"
  password: "${SNOWFLAKE_PASSWORD}"
  role: "${SNOWFLAKE_ROLE_NAME}"
  database: "${SNOWFLAKE_DATABASE}"
  warehouse: "${SNOWFLAKE_WAREHOUSE_NAME}"
  schema: "${SNOWFLAKE_SCHEMA}"
  
# Targets par environnement
environments:
  dev:
    warehouse: "MEDIcore_WH"
    schema: "RAW_DEV"
  prod:
    warehouse: "MEDIcore_WH_XL"
    schema: "RAW_PROD"
  
# Pas utilisé car daily_cdc_batch.py lit tous les topics Debezium winstat.<table> pour les écrire dans RAW_<table>
# Tables à surveiller pour CDC
# Sources MySQL → RAW → STAGING
cdc_tables:
  - COMMANDES   # → RAW.COMMANDES → stg_commandes.sql → fact_commandes.sql
  - FACTURES    # → RAW.FACTURES  → stg_factures.sql → fact_ventes.sql
  - ORDERS      # → RAW.ORDERS → stg_orders.sql → fact_ventes.sql (client_age/sex)
  - PHARMACIE   # → RAW.PHARMACIE → stg_pharmacie.sql → dim_pharmacie.sql
  - MODSTOCK    # → RAW.MODSTOCK → stg_modstock.sql → fact_stock_mouvement.sql
  - DAYBYDAY    # → RAW.DAYBYDAY → stg_daybyday.sql → fact_prix_journalier.sql

# Dimensions MARTS (peuvent venir de plusieurs sources)
dimensions:
  - dim_fournisseur.sql     # FOU_ID, FOU_NOM → fournisseur_sk
  - dim_pharmacie.sql       # PHA_ID → pharmacie_sk (SCD2)
  - dim_produit.sql         # PRD_ID → produit_sk

# Métriques agrégées MARTS
facts:
  - fact_commandes.sql        # CA commandes
  - fact_prix_journalier.sql  # Prix tarif/public/net
  - fact_stock_mouvement.sql  # Delta stock
  - fact_ventes.sql           # CA TTC/HT + client_age/sex